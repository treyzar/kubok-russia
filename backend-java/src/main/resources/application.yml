server:
  port: ${PORT:8080}

spring:
  application:
    name: online-shop-java
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/online_shop}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  scheduler:
    room-starter-fixed-rate: 1000
    room-finisher-fixed-rate: 1000
    bot-manager-fixed-rate: 10000
  rng:
    base-url: ${RNG_BASE_URL:http://localhost:9000}
  events:
    channel-prefix: room.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
